replicaCount: 0

image:
  repository: ghcr.io/jzacharie/keryx-diffusion-engine
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  limits:
    memory: 12Gi
    cpu: 4000m
    nvidia.com/gpu: 1
  requests:
    memory: 12Gi
    cpu: 4000m

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector:
  kubernetes.io/hostname: vm169
  kubernetes.io/arch: amd64

tolerations:
  - key: "special-node"
    operator: "Equal"
    value: "gpu"
    effect: "NoSchedule"

runtimeClassName: nvidia

env:
  S3_ENDPOINT: "https://minio-170-api.zacharie.org"
  S3_BUCKET: "keryx"
  MODEL_ID: "stabilityai/sdxl-turbo"
  S3_ACCESS_KEY_ID: "REDACTED" # pragma: allowlist secret
  S3_SECRET_ACCESS_KEY: "REDACTED" # pragma: allowlist secret
  NVIDIA_VISIBLE_DEVICES: "all"
  NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
