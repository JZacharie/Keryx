<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keryx Orchestrator Dashboard</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b, transparent);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 3rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .job-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .job-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #334155;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .job-id {
            font-family: monospace;
            color: var(--primary);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Keryx Control Center</h1>
        <p style="color: var(--text-dim)">Orchestrating media processing pipelines with precision.</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="input-group">
                <input type="text" id="mediaUrl" placeholder="Enter media URL (e.g. s3://bucket/video.mp4)">
                <button onclick="submitJob()">Submit Job</button>
            </div>

            <h3 style="margin-top: 0">Recent Activities</h3>
            <ul class="job-list" id="jobList">
                <li class="job-item" style="border-bottom: none; color: var(--text-dim); justify-content: center;">
                    No jobs submitted yet.
                </li>
            </ul>
        </div>
    </div>

    <footer>
        &copy; 2026 Keryx Orchestrator • Status: <span style="color: var(--success)">Online</span>
    </footer>

    <script>
        async function submitJob() {
            const url = document.getElementById('mediaUrl').value;
            if (!url) return;

            const jobList = document.getElementById('jobList');
            if (jobList.innerText.includes('No jobs submitted')) {
                jobList.innerHTML = '';
            }

            // Mock submission for now (since we need JWT for real API)
            const id = Math.random().toString(36).substring(2, 10).toUpperCase();
            
            const li = document.createElement('li');
            li.className = 'job-item';
            li.innerHTML = `
                <div>
                    <span class="job-id">${id}</span>
                    <div style="font-size: 0.8rem; color: var(--text-dim)">${url}</div>
                </div>
                <span class="status-badge">INGESTED</span>
            `;
            
            jobList.prepend(li);
            document.getElementById('mediaUrl').value = '';
        }
    </script>
</body>
</html>
