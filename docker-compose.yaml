services:
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: keryx-orchestrator
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
      - EXTRACTOR_URL=http://keryx-extractor:8001
      - DEWATERMARK_URL=http://keryx-dewatermark:8002
      - VOICE_EXTRACTOR_URL=http://keryx-voice-extractor:8003
      - VIDEO_COMPOSER_URL=http://keryx-video-composer:8004
      - VIDEO_GENERATOR_URL=http://keryx-video-generator:8005
      - VOICE_CLONER_URL=http://keryx-voice-cloner:8006
      - VOICE_CLONER_GPT_URL=http://keryx-voice-cloner-gpt:8007
      - DIFFUSION_URL=http://keryx-diffusion-engine:8008
      - PPTX_URL=http://keryx-pptx-builder:8009
      - SCALING_MODE=compose
      - OTEL_ENDPOINT=http://o2-openobserve-router.openobserve.svc:5080
      - OTEL_AUTH_TOKEN=Basic am9zZXBoQHphY2hhcmllLm9yZzpTdXBlcm1hbi02OTIzMA==
      - API_KEY=${API_KEY:-changeme}
    depends_on:
      - redis
    networks:
      - keryx-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  extractor:
    build:
      context: ./services/extractor
    container_name: keryx-extractor
    profiles: ["ai"]
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    env_file:
      - .env
    volumes:
      - ./services/extractor/cookies.txt:/app/config/cookies.txt
    networks:
      - keryx-net

  dewatermark:
    build:
      context: ./services/dewatermark
    container_name: keryx-dewatermark
    profiles: ["ai"]
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - keryx-net

  voice-extractor:
    build:
      context: ./services/voice-extractor
    container_name: keryx-voice-extractor
    profiles: ["ai"]
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - TRANSLATOR_BACKEND=ollama
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - keryx-cache:/app/.cache/whisper
      - .:/data
    networks:
      - keryx-net

  video-composer:
    build:
      context: ./services/video-composer
    container_name: keryx-video-composer
    profiles: ["ai"]
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - VIDEO_ENCODER=h264_nvenc
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - keryx-net

  video-generator:
    build:
      context: ./services/video-generator
    container_name: keryx-video-generator
    profiles: ["ai"]
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hf-models:/app/huggingface
    networks:
      - keryx-net

  voice-cloner:
    build:
      context: ./services/voice-cloner
    container_name: keryx-voice-cloner
    profiles: ["ai"]
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - coqui-models:/root/.local/share/tts
    networks:
      - keryx-net

  voice-cloner-gpt:
    build:
      context: ./services/voice-cloner-gpt
    container_name: keryx-voice-cloner-gpt
    profiles: ["ai"]
    ports:
      - "8007:8007"
    environment:
      - PORT=8007
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./services/voice-cloner-gpt/GPT_weights:/app/GPT_weights
      - ./services/voice-cloner-gpt/SoVITS_weights:/app/SoVITS_weights
      - ./services/voice-cloner-gpt/reference:/app/reference
    networks:
      - keryx-net

  diffusion-engine:
    build:
      context: ./services/diffusion-engine
    container_name: keryx-diffusion-engine
    profiles: ["ai"]
    ports:
      - "8008:8008"
    environment:
      - PORT=8008
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hf-models:/app/huggingface
    networks:
      - keryx-net

  pptx-builder:
    build:
      context: ./services/pptx-builder
    container_name: keryx-pptx-builder
    profiles: ["ai"]
    ports:
      - "8009:8009"
    environment:
      - PORT=8009
    env_file:
      - .env
    networks:
      - keryx-net

  redis:
    image: redis:7-alpine
    container_name: keryx-redis
    networks:
      - keryx-net

  frontend:
    build:
      context: ./services/frontend
    container_name: keryx-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - keryx-net

networks:
  keryx-net:
    driver: bridge

volumes:
  coqui-models:
  keryx-cache:
  hf-models:
