version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: keryx-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin # pragma: allowlist secret
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - keryx-minio-data:/data

  # High-quality voice cloning (GPT-SoVITS)
  voice-cloner:
    build:
      context: ./services/voice-cloner-gpt
      dockerfile: Dockerfile
    container_name: keryx-voice-cloner
    ports:
      - "9880:9880"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - sovits-models:/app/pretrained_models
      # Reference audio
      - ./Mon_enregistrement_1.wav:/app/reference/Mon_enregistrement_1.wav:ro
      # Model cache mount (persistent)
      - voice-cloner-cache:/root/.cache

  # Alternative voice cloning (Coqui/General)
  voice-cloner-coqui:
    build:
      context: ./services/voice-cloner
    container_name: keryx-voice-cloner-coqui
    ports:
      - "9881:9880" # Mapping to 9881 to avoid conflict
    environment:
      - S3_ENDPOINT=http://minio:9000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - coqui-models:/root/.local/share/tts
      - .:/app/host

  diffusion-engine:
    build:
      context: ./services/diffusion-engine
    container_name: keryx-diffusion-engine
    ports:
      - "8000:8000"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin # pragma: allowlist secret
      - S3_BUCKET=keryx
      - MODEL_ID=stabilityai/sdxl-turbo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - keryx-cache:/app/.cache
      - ./outputs:/app/outputs
      - .:/app/host:ro

  wan2gp:
    build:
      context: ./services/wan2gp
    container_name: keryx-wan2gp
    ports:
      - "8001:8001"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin # pragma: allowlist secret
      - S3_BUCKET=keryx
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - keryx-cache:/app/.cache
      - ./outputs:/app/outputs
      - .:/app/host

  video-processor:
    build:
      context: ./services/video-processor
      dockerfile: Dockerfile
    container_name: keryx-video-processor
    environment:
      - VOICE_CLONER_URL=http://voice-cloner:9880
      - DIFFUSION_ENGINE_URL=http://diffusion-engine:8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/app/host:ro
      - ./outputs:/app/outputs
      - whisper-cache:/app/whisper_models
      - hf-cache:/app/huggingface
    depends_on:
      voice-cloner:
        condition: service_started
      diffusion-engine:
        condition: service_started

volumes:
  keryx-minio-data:
  voice-cloner-cache:
  whisper-cache:
  hf-cache:
  keryx-cache:
  sovits-models:
  coqui-models:
