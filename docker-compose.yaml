version: '3.8'

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin # pragma: allowlist secret
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  diffusion-engine:
    build:
      context: ./services/diffusion-engine
    ports:
      - "8000:8000"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin # pragma: allowlist secret
      - S3_BUCKET=keryx
      - MODEL_ID=stabilityai/sdxl-turbo # or a lightweight one for testing
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - hf_cache:/app/huggingface

  wan2gp:
    build:
      context: ./services/wan2gp
    ports:
      - "8001:8001"
    environment:
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin # pragma: allowlist secret
      - S3_BUCKET=keryx
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - hf_cache:/app/huggingface

volumes:
  hf_cache:
