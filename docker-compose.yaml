services:
  voice-cloner-coqui:
    build:
      context: ./services/voice-cloner
    container_name: keryx-voice-cloner-coqui
    ports:
      - "9880:9880"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
    volumes:
      - coqui-models:/root/.local/share/tts
      - .:/app/host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  diffusion-engine:
    build:
      context: ./services/diffusion-engine
    container_name: keryx-diffusion-engine
    ports:
      - "8000:8000"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - MODEL_ID=${DIFFUSION_MODEL_ID}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - keryx-cache:/app/huggingface
      - ./outputs:/app/outputs
      - .:/app/host:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  wan2gp:
    build:
      context: ./services/wan2gp
    container_name: keryx-wan2gp
    ports:
      - "8001:8001"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - keryx-cache:/app/.cache
      - ./outputs:/app/outputs
      - .:/app/host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pptx-builder:
    build:
      context: ./services/pptx-builder
    container_name: keryx-pptx-builder
    ports:
      - "8002:8002"
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${S3_BUCKET}

  video-processor:
    build:
      context: ./services/video-processor
      dockerfile: Dockerfile
    container_name: keryx-video-processor
    environment:
      - VOICE_CLONER_URL=http://voice-cloner-coqui:9880
      - DIFFUSION_ENGINE_URL=http://diffusion-engine:8000
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - .:/app/host:ro
      - ./outputs:/app/outputs
      - whisper-cache:/app/whisper_models
      - hf-cache:/app/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      voice-cloner-coqui:
        condition: service_started
      diffusion-engine:
        condition: service_started

volumes:
  whisper-cache:
  hf-cache:
  keryx-cache:
  coqui-models:
