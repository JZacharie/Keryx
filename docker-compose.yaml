version: '3.8'

services:
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: keryx-orchestrator
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
      - EXTRACTOR_URL=http://extractor:8010
      - DEWATERMARK_URL=http://dewatermark:8011
      - VOICE_EXTRACTOR_URL=http://voice-extractor:8012
      - VIDEO_COMPOSER_URL=http://video-composer:8013
      - VIDEO_GENERATOR_URL=http://wan2gp:8014
      - VOICE_CLONER_URL=http://voice-cloner:9880
      - PPTX_URL=http://pptx-builder:8002
      - SCALING_MODE=compose
      - API_KEY=${API_KEY:-changeme}
    depends_on:
      - redis
    networks:
      - keryx-net

  extractor:
    build:
      context: ./services/extractor
    container_name: keryx-extractor
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
    networks:
      - keryx-net

  dewatermark:
    build:
      context: ./services/dewatermark
    container_name: keryx-dewatermark
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
    networks:
      - keryx-net

  voice-extractor:
    build:
      context: ./services/voice-extractor
    container_name: keryx-voice-extractor
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    volumes:
      - keryx-cache:/app/.cache/whisper
      - .:/data
    ports:
      - "8000:8000"
    networks:
      - keryx-net

  video-composer:
    build:
      context: ./services/video-composer
    container_name: keryx-video-composer
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
    networks:
      - keryx-net

  wan2gp:
    build:
      context: ./services/wan2gp
    container_name: keryx-wan2gp
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
    networks:
      - keryx-net

  voice-cloner:
    build:
      context: ./services/voice-cloner
    container_name: keryx-voice-cloner
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
    volumes:
      - coqui-models:/root/.local/share/tts
    networks:
      - keryx-net

  pptx-builder:
    build:
      context: ./services/pptx-builder
    container_name: keryx-pptx-builder
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-https://minio-170-api.zacharie.org}
      - S3_BUCKET=${S3_BUCKET:-keryx}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-keryx}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-keryx_secret}
    networks:
      - keryx-net

  redis:
    image: redis:7-alpine
    container_name: keryx-redis
    networks:
      - keryx-net

  frontend:
    build:
      context: ./services/frontend
    container_name: keryx-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    networks:
      - keryx-net

networks:
  keryx-net:
    driver: bridge

volumes:
  coqui-models:
  keryx-cache:
