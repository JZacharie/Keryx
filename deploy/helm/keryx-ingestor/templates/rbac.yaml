apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keryx-ingestor.fullname" . }}
  labels:
    {{- include "keryx-ingestor.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "keryx-ingestor.fullname" . }}-scaling
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["http.keda.sh"]
    resources: ["httpscaledobjects"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "keryx-ingestor.fullname" . }}-scaling-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "keryx-ingestor.fullname" . }}-scaling
subjects:
  - kind: ServiceAccount
    name: {{ include "keryx-ingestor.fullname" . }}
    namespace: {{ .Release.Namespace }}
