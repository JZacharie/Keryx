apiVersion: apps/v1
kind: Deployment
metadata:
  name: keryx-voice-cloner
  namespace: keryx
  labels:
    app.kubernetes.io/component: voice-cloner
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: voice-cloner
  template:
    metadata:
      labels:
        app.kubernetes.io/component: voice-cloner
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: vm169
        kubernetes.io/arch: amd64
      tolerations:
      - key: "special-node"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"
      containers:
      - name: voice-cloner
        image: ghcr.io/jzacharie/keryx-voice-cloner:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9880
        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: COQUI_TOS_AGREED
          value: "1"
        - name: S3_ENDPOINT
          value: "https://minio-170-api.zacharie.org"
        - name: S3_BUCKET
          value: "keryx"

        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        livenessProbe:
          httpGet:
            path: /health
            port: 9880
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 9880
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: 16Gi
          requests:
            cpu: 1000m
            memory: 8Gi
        volumeMounts:
        - name: tts-cache
          mountPath: /home/keryx/.local/share/tts
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      volumes:
      - name: tts-cache
        persistentVolumeClaim:
          claimName: tts-models-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tts-models-pvc
  namespace: keryx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: proxmox-aquabot-bpool-xfs-i
---
apiVersion: v1
kind: Service
metadata:
  name: keryx-voice-cloner
  namespace: keryx
spec:
  selector:
    app.kubernetes.io/component: voice-cloner
  ports:
  - name: http
    port: 9880
    targetPort: 9880
    protocol: TCP
