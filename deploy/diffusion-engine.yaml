apiVersion: apps/v1
kind: Deployment
metadata:
  name: keryx-diffusion-engine
  namespace: keryx
  labels:
    app.kubernetes.io/component: diffusion-engine
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: diffusion-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/component: diffusion-engine
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: vm169
        kubernetes.io/arch: amd64
      imagePullSecrets:
        - name: ghcr-login
      containers:
        - name: diffusion-engine
          image: ghcr.io/jzacharie/keryx-diffusion-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: S3_ENDPOINT
              value: "https://minio-170-api.zacharie.org"
            - name: S3_BUCKET
              value: "keryx"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              cpu: 2000m
              memory: 12Gi
              nvidia.com/gpu: 1
            requests:
              cpu: 1000m
              memory: 6Gi
          volumeMounts:
            - name: hf-cache
              mountPath: /app/huggingface
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: keryx-diffusion-engine
  namespace: keryx
spec:
  selector:
    app.kubernetes.io/component: diffusion-engine
  ports:
    - name: http
      port: 8000
      targetPort: 8000
