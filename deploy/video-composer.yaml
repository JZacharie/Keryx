apiVersion: apps/v1
kind: Deployment
metadata:
  name: keryx-video-composer
  namespace: keryx
  labels:
    app.kubernetes.io/component: video-composer
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: video-composer
  template:
    metadata:
      labels:
        app.kubernetes.io/component: video-composer
    spec:
      imagePullSecrets:
        - name: ghcr-login
      nodeSelector:
        kubernetes.io/hostname: vm169
        kubernetes.io/arch: amd64
      runtimeClassName: nvidia
      containers:
        - name: video-composer
          image: ghcr.io/jzacharie/keryx-video-composer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: S3_ENDPOINT
              value: "https://minio-170-api.zacharie.org"
            - name: S3_BUCKET
              value: "keryx"
            - name: VIDEO_ENCODER
              value: "h264_nvenc"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: 1
            requests:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keryx-video-composer
  namespace: keryx
spec:
  selector:
    app.kubernetes.io/component: video-composer
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
