apiVersion: apps/v1
kind: Deployment
metadata:
  name: keryx-extractor
  namespace: keryx
  labels:
    app.kubernetes.io/component: extractor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: extractor
  template:
    metadata:
      labels:
        app.kubernetes.io/component: extractor
    spec:
      imagePullSecrets:
        - name: ghcr-login
      nodeSelector:
        kubernetes.io/hostname: vm169
        kubernetes.io/arch: amd64
      containers:
        - name: extractor
          image: ghcr.io/jzacharie/keryx-extractor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8010
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: S3_ENDPOINT
              value: "https://minio-170-api.zacharie.org"
            - name: S3_BUCKET
              value: "keryx"
            - name: RUST_LOG
              value: "info"
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keryx-extractor
  namespace: keryx
spec:
  selector:
    app.kubernetes.io/component: extractor
  ports:
    - name: http
      port: 8010
      targetPort: 8010
