apiVersion: apps/v1
kind: Deployment
metadata:
  name: keryx-voice-extractor
  namespace: keryx
  labels:
    app.kubernetes.io/component: voice-extractor
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/component: voice-extractor
  template:
    metadata:
      labels:
        app.kubernetes.io/component: voice-extractor
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: vm169
        kubernetes.io/arch: amd64
      tolerations:
      - key: "special-node"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"
      imagePullSecrets:
        - name: ghcr-login
      containers:
      - name: voice-extractor
        image: ghcr.io/jzacharie/keryx-voice-extractor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: WHISPER_MODEL
          value: "medium"
        - name: TRANSLATOR_BACKEND
          value: "ollama"
        - name: OLLAMA_URL
          value: "http://ollama-service:11434"
        - name: S3_ENDPOINT
          value: "https://minio-170-api.zacharie.org"
        - name: S3_BUCKET
          value: "keryx"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility,video"
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: 8Gi
          requests:
            cpu: 1000m
            memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keryx-voice-extractor
  namespace: keryx
spec:
  selector:
    app.kubernetes.io/component: voice-extractor
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
