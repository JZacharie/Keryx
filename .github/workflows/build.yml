          cache-to: type=gha,mode=max

  build-wan2gp:
    name: 🌐 Build WAN2GP Image
    needs: changes
    if: needs.changes.outputs.wan2gp == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
