name: 🏛️ Keryx Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force building all images'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build || 'none' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keryx-ingestor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Phase 0: Detection
  # ============================================================================
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      ingestor: ${{ steps.filter.outputs.ingestor }}
      diffusion: ${{ steps.filter.outputs.diffusion }}
      pptx: ${{ steps.filter.outputs.pptx }}
      voice_cloner: ${{ steps.filter.outputs.voice_cloner }}
      video_processor: ${{ steps.filter.outputs.video_processor }}
      voice_cloner_gpt: ${{ steps.filter.outputs.voice_cloner_gpt }}
      wan2gp: ${{ steps.filter.outputs.wan2gp }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ingestor:
              - 'services/ingestor/**'
              - 'deploy/helm/keryx-ingestor/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            diffusion:
              - 'services/diffusion-engine/**'
            pptx:
              - 'services/pptx-builder/**'
            voice_cloner:
              - 'services/voice-cloner/**'
            video_processor:
              - 'services/video-processor/**'
            voice_cloner_gpt:
              - 'services/voice-cloner-gpt/**'
            wan2gp:
              - 'services/wan2gp/**'

  # ============================================================================
  # Phase 1: Security Audit
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --verbose --redact

  # ============================================================================
  # Phase 2: Build Rust Ingestor binary
  # ============================================================================
  build-rust:
    name: 🦀 Build Rust Ingestor
    needs: changes
    if: needs.changes.outputs.ingestor == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies (cargo-chef)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install system dependencies (OpenCV & Clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev clang libclang-dev mold

      - name: Install cargo-chef
        run: |
          if ! command -v cargo-chef &> /dev/null; then
            cargo install cargo-chef
          fi

      - name: Cargo Chef Prepare
        run: cargo chef prepare --recipe-path recipe.json

      - name: Cargo Chef Cook (Cache warmup)
        run: cargo chef cook --release --recipe-path recipe.json

      - name: Build Rust binary (Actual build)
        run: |
          cargo build --release --bin keryx-ingestor
          ls -lh target/release/keryx-ingestor

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: keryx-ingestor-binary
          path: target/release/keryx-ingestor
          retention-days: 1

  # ============================================================================
  # Phase 3: Containerization
  # ============================================================================
  build-ingestor:
    name: 🐳 Build Ingestor Image
    needs: build-rust
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: keryx-ingestor-binary
          path: services/ingestor/target/release/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-ingestor
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/ingestor
          target: release-ci
          build-args: |
            PREBUILT_BINARY=target/release/keryx-ingestor
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-diffusion:
    name: 🎨 Build Diffusion Image
    needs: changes
    if: needs.changes.outputs.diffusion == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-diffusion-engine
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/diffusion-engine
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pptx:
    name: 📄 Build PPTX Image
    needs: changes
    if: needs.changes.outputs.pptx == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-pptx-builder
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/pptx-builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-voice-cloner:
    name: 🎙️ Build Voice Cloner Image
    needs: changes
    if: needs.changes.outputs.voice_cloner == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-voice-cloner
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
