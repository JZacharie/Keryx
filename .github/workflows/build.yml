          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-wan2gp
          tags: |
            type=ref,event=branch
            type=sha,prefix=
