name: 🏛️ Keryx Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force building all images'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_build || 'none' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keryx-ingestor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Phase 0: Detection
  # ============================================================================
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      diffusion: ${{ steps.filter.outputs.diffusion }}
      pptx: ${{ steps.filter.outputs.pptx }}
      voice_cloner: ${{ steps.filter.outputs.voice_cloner }}
      video_processor: ${{ steps.filter.outputs.video_processor }}
      voice_cloner_gpt: ${{ steps.filter.outputs.voice_cloner_gpt }}
      wan2gp: ${{ steps.filter.outputs.wan2gp }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            orchestrator:
              - 'services/orchestrator/**'
              - 'services/keryx-core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            diffusion:
              - 'services/diffusion-engine/**'
            pptx:
              - 'services/pptx-builder/**'
            voice_cloner:
              - 'services/voice-cloner/**'
            video_processor:
              - 'services/video-processor/**'
            voice_cloner_gpt:
              - 'services/voice-cloner-gpt/**'
            wan2gp:
              - 'services/wan2gp/**'
            frontend:
              - 'services/frontend/**'

  # ============================================================================
  # Phase 1: Security Audit
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ============================================================================
  # Phase 2: Containerization
  # ============================================================================
  build-ingestor:
    name: 🐳 Build Ingestor Image
    needs: changes
    if: needs.changes.outputs.orchestrator == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-ingestor
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image (full in-Docker build)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/orchestrator/Dockerfile
          target: release
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-diffusion:
    name: 🎨 Build Diffusion Image
    needs: changes
    if: needs.changes.outputs.diffusion == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-diffusion-engine
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/diffusion-engine
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pptx:
    name: 📄 Build PPTX Image
    needs: changes
    if: needs.changes.outputs.pptx == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/jzacharie/keryx-pptx-builder
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/pptx-builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-voice-cloner:
    name: 🎙️ Build Voice Cloner Image
    needs: changes
    if: needs.changes.outputs.voice_cloner == 'true' || github.event.inputs.force_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
