      #       kubectl rollout restart deployment keryx-keryx-orchestrator -n keryx
      #       kubectl rollout status deployment keryx-keryx-orchestrator -n keryx
      #     fi

      #     if [ "${{ needs.changes.outputs.diffusion }}" == "true" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
      #       kubectl rollout restart deployment keryx-diffusion-engine -n keryx
      #       kubectl rollout status deployment keryx-diffusion-engine -n keryx
      #     fi

      #     if [ "${{ needs.changes.outputs.pptx }}" == "true" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
      #       kubectl rollout restart deployment keryx-pptx-builder -n keryx
      #     fi

      #     if [ "${{ needs.changes.outputs.voice_cloner }}" == "true" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
      #        kubectl rollout restart deployment voice-cloner -n keryx
      #        kubectl rollout status deployment voice-cloner -n keryx
      #     fi

      #     if [ "${{ needs.changes.outputs.video_processor }}" == "true" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
      #       kubectl rollout restart deployment video-processor -n keryx
      #     fi

      #     if [ "${{ needs.changes.outputs.voice_cloner_gpt }}" == "true" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
      #       kubectl rollout restart deployment voice-cloner-gpt -n keryx
      #     fi

      #     if [ "${{ needs.changes.outputs.wan2gp }}" == "true" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
      #       kubectl rollout restart deployment wan2gp -n keryx
      #     fi

      - name: Notify Slack
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"✅ *Keryx Deployed to Cluster*\n\n🚀 Version: \`${{ github.sha }}\`\n🌐 URL: https://keryx.p.zacharie.org\n📝 Commit: ${COMMIT_MSG}\"
            }" \
            $SLACK_WEBHOOK
