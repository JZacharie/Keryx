          cache-to: type=gha,mode=max

  # ============================================================================
  # Phase 4: Continuous Deployment (CD)
  # ============================================================================
  deploy:
    name: 🚀 Deploy to Cluster
    needs: [changes, build-ingestor, build-diffusion, build-pptx, build-voice-cloner, build-video-processor, build-voice-cloner-gpt, build-wan2gp, build-frontend]
    if: always() && (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch') && (needs.changes.outputs.orchestrator == 'true' || needs.changes.outputs.diffusion == 'true' || needs.changes.outputs.pptx == 'true' || needs.changes.outputs.voice_cloner == 'true' || needs.changes.outputs.video_processor == 'true' || needs.changes.outputs.voice_cloner_gpt == 'true' || needs.changes.outputs.wan2gp == 'true' || needs.changes.outputs.frontend == 'true' || github.event.inputs.force_build == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_JO3 }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # - name: ArgoCD Sync
