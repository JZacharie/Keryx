name: 🏛️ Keryx Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/keryx-ingestor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Phase 1: Security Audit
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --verbose --redact

  # ============================================================================
  # Phase 2: Build Rust Ingestor binary
  # ============================================================================
  build-rust:
    name: 🦀 Build Rust Ingestor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust with cache
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "keryx-ingestor"

      - name: Install system dependencies (OpenCV & Clang)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev clang libclang-dev

      - name: Build Rust binary (release)
        run: |
          cargo build --release --bin keryx-ingestor
          ls -lh target/release/keryx-ingestor

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: keryx-ingestor-binary
          path: target/release/keryx-ingestor
          retention-days: 1

  # ============================================================================
  # Phase 3: Containerization
  # ============================================================================
  build-ingestor:
    name: 🐳 Build Ingestor Image
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: keryx-ingestor-binary
          path: services/ingestor/target/release/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/keryx-ingestor
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/ingestor
          target: release-ci
          build-args: |
            PREBUILT_BINARY=target/release/keryx-ingestor
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-diffusion:
    name: 🎨 Build Diffusion Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/keryx-diffusion-engine
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/diffusion-engine
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-pptx:
    name: 📄 Build PPTX Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/keryx-pptx-builder
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/pptx-builder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-voice-cloner:
    name: 🎙️ Build Voice Cloner Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/keryx-voice-cloner
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/voice-cloner
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Phase 4: Continuous Deployment (CD)
  # ============================================================================
  deploy:
    name: 🚀 Deploy to Cluster
    needs: [build-ingestor, build-diffusion, build-pptx, build-voice-cloner]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_JO3 }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: ArgoCD Sync
        run: |
          # Patch ArgoCD Application to trigger a hard refresh/sync
          kubectl patch app keryx -n argocd -p '{"operation":{"sync":{"revisions":["main","main"]}}}' --type=merge

      - name: Rollout deployment
        run: |
          kubectl rollout restart deployment keryx-keryx-ingestor -n keryx || echo "Ingestor not found"
          kubectl rollout restart deployment keryx-diffusion-engine -n keryx || echo "Diffusion Engine not found"
          kubectl rollout restart deployment keryx-pptx-builder -n keryx || echo "PPTX Builder not found"
          kubectl rollout restart deployment voice-cloner -n keryx || echo "Voice Cloner not found"

          # Only wait if they exist
          if kubectl get deployment keryx-keryx-ingestor -n keryx; then
            kubectl rollout status deployment keryx-keryx-ingestor -n keryx
          fi

          if kubectl get deployment keryx-diffusion-engine -n keryx; then
            kubectl rollout status deployment keryx-diffusion-engine -n keryx
          fi

          if kubectl get deployment voice-cloner -n keryx; then
             kubectl rollout status deployment voice-cloner -n keryx
          fi

      - name: Notify Slack
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"✅ *Keryx Deployed to Cluster*\n\n🚀 Version: \`${{ github.sha }}\`\n🌐 URL: https://keryx.p.zacharie.org\n📝 Commit: ${COMMIT_MSG}\"
            }" \
            $SLACK_WEBHOOK
